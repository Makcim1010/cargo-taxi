info:
  name: Register (driver)
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/user/register
  body:
    type: json
    data: |-
      {
        "surname": "Иванов",
        "name": "Сергей",
        "phone": "+79124376562",
        "password": "secret_password",
        "license_number": "55 55 555555",
        "license_date": "2026-06-01",
        "license_categories": ["B", "C"],
        "has_loaders": true,
        "loaders_count": 3,
        "roles": ["admin", "driver"]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test(\"Successful POST request\", function () {\r

        \    expect(res.getStatus()).to.be.oneOf([200, 201]);\r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
